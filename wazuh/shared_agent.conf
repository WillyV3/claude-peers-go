<agent_config>
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes" report_changes="yes">/home/willy/.config/claude-peers</directories>
    <directories check_all="yes" realtime="yes">/home/willy/.ssh</directories>
    <directories check_all="yes" realtime="yes">/home/willy/.local/bin</directories>
    <directories check_all="yes" realtime="yes">/usr/local/bin</directories>
    <directories check_all="yes" realtime="yes">/etc/systemd/system</directories>
    <directories check_all="yes" realtime="yes">/home/willy/.config/systemd/user</directories>
    <ignore>/home/willy/.ssh/known_hosts</ignore>
    <ignore>/home/willy/.ssh/known_hosts.old</ignore>
    <ignore type="sregex">.log$</ignore>
    <ignore type="sregex">.db$</ignore>
    <ignore type="sregex">.db-journal$</ignore>
  </syscheck>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
    <filter field="_SYSTEMD_UNIT">sshd.service</filter>
  </localfile>

  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
    <filter field="_SYSTEMD_UNIT">sudo.service</filter>
  </localfile>
</agent_config>
